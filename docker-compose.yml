version: '3.8'

services:
  maudy-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maudy-website
    restart: unless-stopped
    # ⚠️ JANGAN definisikan ports di sini saat pakai Coolify
    # Coolify & Traefik mengatur routing sendiri via network coolify
    expose:
      - "80"
    environment:
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    external: true
    name: coolify
