version: '3.8'

services:
  maudy-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maudy-website
    restart: unless-stopped
    # ⚠️ JANGAN definisikan ports di sini saat pakai Coolify
    # Coolify & Traefik mengatur routing sendiri via network coolify
    expose:
      - "80"
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - ./:/var/www/html/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    external: true
    name: coolify
