# ============================================================
# Nginx Configuration — MAUDY IT Solution
# Optimized for: static files, gzip, caching, security
# ============================================================

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- Charset ----
    charset utf-8;

    # ---- Gzip Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- Cache: Static Assets (1 tahun) ----
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- Cache: CSS & JS (1 bulan) ----
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ---- Admin panel: lindungi dari indexing ----
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ---- SPA fallback: semua route kembali ke index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Robots & Sitemap ----
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /sitemap.xml { access_log off; }
    location = /favicon.ico { access_log off; log_not_found off; }

    # ---- Error Pages ----
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # ---- Log format ----
    access_log /var/log/nginx/maudy_access.log;
    error_log  /var/log/nginx/maudy_error.log warn;
}
